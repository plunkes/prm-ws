slam_toolbox:
  ros__parameters:
    # Use base_link to match Nav2 robot_base_frame
    base_frame: base_link

    # Process scans much more often during rotation so SLAM doesn't lose track.
    # Default was 0.5 rad (~28°) and 0.5 m — far too coarse for in-place turns.
    minimum_travel_heading: 0.05   # ~3° — update on every small turn
    minimum_travel_distance: 0.15  # 15 cm
    map_update_interval: 2.0       # publish map every 2 s (default 5 s)

    # Tighter scan-matching to recover faster after partial map loss.
    distance_variance_penalty: 0.3
    angle_variance_penalty: 1.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
