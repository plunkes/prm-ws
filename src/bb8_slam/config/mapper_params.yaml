slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    mode: mapping # Mapeamento online

    debug_logging: false
    transform_timeout: 0.2
    transform_publish_period: 0.02

    resolution: 0.05
    max_laser_range: 10.0
    minimum_time_interval: 0.1
    minimun_travel_distance: 0.05
    minimun_travel_heading: 0.05

    tf_buffer_duration: 10.0
    stack_size_to_use: 40000000
